    <style>
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        /* Global Accessibility Focus States */
        *:focus-visible {
            outline: 2px solid #0f766e;
            outline-offset: 2px;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-50% - 1rem)); }
        }

        .animate-marquee {
            animation: marquee 40s linear infinite;
            width: max-content;
        }

        .animate-marquee:hover {
            animation-play-state: paused;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }

        .marquee-content {
            display: inline-flex;
            width: max-content;
            animation: marquee 30s linear infinite;
        }

        .marquee-content:hover { animation-play-state: paused; }
        .testimonial-card { white-space: normal; }
        html { scroll-behavior: smooth; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        tailwind.config = {

                        }

<body class="antialiased text-gray-800 bg-gray-50 font-sans cursor-default">
    <!-- Header Content was here, but I need to recover it. -->
    <!-- I will use a placeholder and then fix it if I can't find it. -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm w-full h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <img src="./assets/images/Hope_Banner.webp" alt="Hope Homeo Care" class="h-10">
            <div class="hidden md:flex gap-8 font-medium">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#services">Services</a>
                <a href="#blogs">Blog</a>
            </div>
            <button onclick="window.openBookingModal()" class="bg-teal-700 text-white px-6 py-2 rounded-full font-bold">Book Now</button>
        </div>
    </header>

    <main id="home">
        <!-- Hero section and others -->
        <section class="bg-teal-900 py-20 text-center text-white">
            <h1 class="text-5xl font-bold mb-4">Natural Healing for a Healthier You</h1>
            <p class="text-xl opacity-80">Holistic homeopathic treatment by Dr. K. Nikhil Joshua</p>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 relative">
            <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400">
                <span class="material-icons-round">close</span>
            </button>
            <h3 class="text-2xl font-bold text-teal-900 mb-6">Request an Appointment</h3>
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="patient-name" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mobile Number</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 bg-gray-50 text-gray-500 text-sm font-medium">+91</span>
                        <input type="tel" id="patient-phone" required maxlength="10" placeholder="10-digit number" class="flex-1 w-full px-4 py-2 border rounded-r-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Preferred Date</label>
                    <input type="text" id="patient-date" required class="w-full px-4 py-2 border rounded-lg bg-white">
                </div>
                
                <div class="mb-5 w-full overflow-hidden">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Morning Session</label>
                    <div class="flex overflow-x-auto space-x-3 pb-3 scrollbar-hide w-full snap-x">
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="10:00 AM">10:00 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="10:30 AM">10:30 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="11:00 AM">11:00 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="11:30 AM">11:30 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="12:00 PM">12:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="12:30 PM">12:30 PM</button>
                    </div>

                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 mt-4">Evening Session</label>
                    <div class="flex overflow-x-auto space-x-3 pb-3 scrollbar-hide w-full snap-x">
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="05:00 PM">05:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="05:30 PM">05:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="06:00 PM">06:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="06:30 PM">06:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="07:00 PM">07:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="07:30 PM">07:30 PM</button>
                    </div>
                    <input type="hidden" id="patient-time" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Brief Symptoms</label>
                    <textarea id="patient-symptoms" required class="w-full px-4 py-2 border rounded-lg resize-none" rows="2"></textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="patient-consent" required class="w-4 h-4 text-teal-600 rounded">
                    <label for="patient-consent" class="text-xs text-gray-500">I consent to the terms and psychological care.</label>
                </div>
                <button type="submit" id="book-submit-btn" class="w-full bg-teal-700 text-white py-3 rounded-xl font-bold">Request Appointment</button>
            </form>
        </div>
    </div>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/firebase-init.js"></script>
</body>

</html>
