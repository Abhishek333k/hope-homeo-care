name: Sync Reviews & Deploy Website

on:
  push:
    branches: ["main"] # Deploys immediately when YOU push code
  schedule:
    - cron: '0 0 * * 0' # Auto-fetches reviews every Sunday at Midnight
  workflow_dispatch: # Allows manual triggering from the GitHub interface

# Sets permissions so the bot is allowed to publish the live website
permissions:
  contents: write
  pages: write
  id-token: write

# Prevents two builds from running at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Latest Google Reviews
        env:
          PLACE_ID: ${{ secrets.PLACE_ID }}
          API_KEY: ${{ secrets.API_KEY }}
        run: node scripts/fetch-reviews.js
        
      - name: Commit Reviews to Repo (if changed)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/reviews.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-sync reviews" && git push)

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Website Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads your entire folder to the live server

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-sync # Waits for the reviews to sync before deploying
    steps:
      - name: Deploy to Live Server
        id: deployment
        uses: actions/deploy-pages@v4