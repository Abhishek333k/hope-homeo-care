name: Sync Google Reviews

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Latest Google Reviews
        run: node scripts/fetch-reviews.js
        env:
          PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/reviews.json
          
          if git diff --staged --quiet; then
            echo "No changes detected in reviews."
          else
            git commit -m "chore: auto-sync 4+ star google reviews"
            git push
          fi
