name: Weekly Google Reviews Sync

on:
  schedule:
    # Runs at 00:00 every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows you to run it manually from GitHub

jobs:
  update-reviews:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Fetch Latest Reviews
      env:
        PLACE_ID: ${{ secrets.PLACE_ID }}
        API_KEY: ${{ secrets.API_KEY }}
      run: node scripts/fetch-reviews.js
      
    - name: Commit and Push Changes
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add assets/data/reviews.json
        # Only commit if there are actually changes to the file
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update google reviews" && git push)    