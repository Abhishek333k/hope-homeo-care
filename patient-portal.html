<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | Hope Homeo Care</title>
    <meta name="title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta name="description" content="Expert homeopathic treatment in Mangalagiri. Specialized care for chronic diseases, skin conditions, respiratory issues, and holistic wellness.">
    <meta name="keywords" content="Homeopathy, Mangalagiri, Dr. K. Nikhil Joshua, Homeo clinic, best homeopathy doctor, chronic disease treatment, BHMS">
    <meta name="author" content="Hope Homeo Care">
    <meta name="theme-color" content="#0f766e">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hopehomeocare.web.app/"> 
    <meta property="og:title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta property="og:description" content="Expert homeopathic treatment in Mangalagiri. Book your online or in-person consultation today.">
    <meta property="og:image" content="https://hopehomeocare.web.app/assets/images/gallery/hope-homeo-care-mangalagiri-guntur-general-physician-doctors-rgezx3ppq6.jpg"> 

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://hopehomeocare.web.app/">
    <meta property="twitter:title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta property="twitter:description" content="Expert homeopathic treatment in Mangalagiri. Book your online or in-person consultation today.">
    <meta property="twitter:image" content="https://hopehomeocare.web.app/assets/images/gallery/hope-homeo-care-mangalagiri-guntur-general-physician-doctors-rgezx3ppq6.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#f0fdf4', 100: '#dcfce7', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534', 900: '#14532d' },
                        slate: { 700: '#1e293b', 800: '#0f172a', 900: '#0B1320', 950: '#060B13' }
                    },
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        *:focus-visible { outline: 2px solid #0f766e; outline-offset: 2px; }
        body { font-family: 'Outfit', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Progressive Button State */
        #internal-booking-form:invalid #int-book-submit {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <a href="index.html" class="flex items-center gap-2 text-teal-700 font-bold text-xl">
            <span aria-hidden="true" class="material-icons-round">arrow_back</span> Back to Clinic
        </a>
        <div class="flex items-center gap-3">
            <button id="switch-profile-btn" class="hidden text-sm font-bold text-teal-600 hover:bg-teal-50 px-4 py-2 rounded-lg transition-colors border border-teal-200">Switch Profile</button>
            <button id="logout-btn" class="hidden text-sm font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-lg transition-colors">Logout</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-6 overflow-y-auto w-full max-w-4xl mx-auto">
        
        <div id="profile-selector-view" class="hidden w-full max-w-2xl mx-auto mt-12 text-center">
            <h2 class="text-3xl lg:text-4xl font-bold text-slate-800 mb-2">Who is accessing?</h2>
            <p class="text-slate-500 mb-10 text-lg">Multiple profiles are linked to this mobile number.</p>
            <div id="family-profiles-container" class="flex flex-wrap justify-center gap-6">
            </div>
        </div>

        <div id="clinical-feed-view" class="hidden w-full">
            <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-bold text-slate-800">Medical Advice & Guidance</h2>
                    <p class="text-slate-500 mt-1">Your unified medical history and prescriptions.</p>
                </div>
                <button onclick="window.openInternalBooking()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-teal-600/20 transition-all flex items-center justify-center gap-2 w-full md:w-auto">
                    <span aria-hidden="true" class="material-icons-round">add_circle</span> Book Session
                </button>
            </div>

            <!-- High-End Patient Profile Identity Card -->
            <div id="profile-header" class="mb-10 bg-white p-6 md:p-8 rounded-3xl shadow-xl shadow-teal-900/5 border border-slate-100 flex flex-col md:flex-row items-center gap-6 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-slate-800"></div>
                <div id="profile-avatar" class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-slate-50 border-4 border-slate-100 text-slate-800 flex items-center justify-center text-3xl md:text-4xl font-black shrink-0 shadow-inner"></div>
                <div class="text-center md:text-left flex-1">
                    <h1 id="profile-name" class="text-2xl md:text-3xl font-extrabold text-slate-900 mb-1 tracking-tight"></h1>
                    <p id="profile-member-since" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4"></p>
                    <div id="profile-pills" class="flex flex-wrap justify-center md:justify-start gap-3">
                        <!-- JS generated high-contrast pills here -->
                    </div>
                </div>
            </div>

            <!-- Current Remedy Card -->
            <div id="current-remedy-card" class="bg-white p-6 md:p-8 rounded-2xl border border-teal-200 shadow-xl shadow-teal-900/5 mb-10 hidden relative overflow-hidden">
                <div class="absolute top-0 left-0 w-2 h-full bg-teal-500"></div>
                <div class="flex items-center gap-2 mb-6">
                    <span aria-hidden="true" class="material-icons-round text-teal-600 border border-teal-100 bg-teal-50 rounded-full p-2">medication</span>
                    <h3 class="text-lg font-extrabold text-slate-800 uppercase tracking-widest">Active Remedy</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50 p-6 rounded-xl border border-slate-100" id="current-remedy-details">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="border-l-2 border-slate-200 ml-4 md:ml-6 pl-8 md:pl-10 space-y-6 relative pb-10" id="clinical-feed">
                <!-- Feed entries injected by JS -->
            </div>
        </div>

    </main>

    <div id="recaptcha-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div id="internal-booking-modal" 
        role="dialog" aria-modal="true"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4 transition-opacity opacity-0">
        <div id="internal-booking-modal-content" class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-y-auto max-h-[90vh] hide-scrollbar transform scale-95 transition-all duration-500 p-6 md:p-8 relative my-auto">
            <button onclick="window.closeInternalBooking()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500"><span aria-hidden="true" class="material-icons-round">close</span></button>
            <h3 class="text-xl font-bold text-slate-800 mb-1">Book New Session</h3>
            <p class="text-sm text-slate-500 mb-6">Booking for: <span id="booking-for-name" class="font-bold text-teal-600"></span></p>
            
            <form id="internal-booking-form" class="text-left">
                <!-- Flex Layout for Columns -->
                <div class="flex flex-col md:flex-row gap-8">
                    <!-- Left Column: Primary Data -->
                    <div class="w-full flex-1 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Preferred Date</label>
                            <input type="text" id="int-book-date" placeholder="DD/MM/YYYY" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-teal-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Brief Symptoms / Reason</label>
                            <textarea id="int-book-symptoms" required rows="2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-teal-500 resize-none" placeholder="e.g., Fever, follow-up..."></textarea>
                        </div>
                    </div>

                    <!-- Right Column: Time Slot Expansion -->
                    <div id="int-time-slot-column" class="w-full md:w-[380px] shrink-0 hidden opacity-0 transition-opacity duration-300 border-t md:border-t-0 md:border-l border-slate-100 md:pl-8">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Preferred Time Slot</label>
                        <div class="space-y-2 bg-slate-50/50 p-2 rounded-2xl border border-slate-100">
                            <input type="hidden" id="int-book-time" required>
                            
                            <!-- Morning Accordion -->
                            <div class="border border-slate-200 rounded-2xl bg-white overflow-hidden accordion-item">
                                <button type="button" onclick="window.toggleAccordion('morning')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 transition-all outline-none">
                                    <div class="flex items-center gap-2">
                                        <span class="material-icons-round text-amber-500 text-lg">light_mode</span>
                                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-700">Morning Session</span>
                                    </div>
                                    <span id="chevron-morning" class="material-icons-round text-slate-400 transition-transform duration-300">expand_more</span>
                                </button>
                                <div id="content-morning" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                                    <div id="slots-morning" class="grid grid-cols-3 gap-2 p-4 pt-5 pb-5"></div>
                                </div>
                            </div>

                            <!-- Afternoon Accordion -->
                            <div class="border border-slate-200 rounded-2xl bg-white overflow-hidden accordion-item">
                                <button type="button" onclick="window.toggleAccordion('afternoon')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 transition-all outline-none">
                                    <div class="flex items-center gap-2">
                                        <span class="material-icons-round text-orange-500 text-lg">wb_sunny</span>
                                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-700">Afternoon Session</span>
                                    </div>
                                    <span id="chevron-afternoon" class="material-icons-round text-slate-400 transition-transform duration-300">expand_more</span>
                                </button>
                                <div id="content-afternoon" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                                    <div id="slots-afternoon" class="grid grid-cols-3 gap-2 p-4 pt-5 pb-5"></div>
                                </div>
                            </div>

                            <!-- Evening Accordion -->
                            <div class="border border-slate-200 rounded-2xl bg-white overflow-hidden accordion-item">
                                <button type="button" onclick="window.toggleAccordion('evening')" class="w-full px-4 py-3 flex items-center justify-between hover:bg-slate-50 transition-all outline-none">
                                    <div class="flex items-center gap-2">
                                        <span class="material-icons-round text-indigo-500 text-lg">bedtime</span>
                                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-700">Evening Session</span>
                                    </div>
                                    <span id="chevron-evening" class="material-icons-round text-slate-400 transition-transform duration-300">expand_more</span>
                                </button>
                                <div id="content-evening" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                                    <div id="slots-evening" class="grid grid-cols-3 gap-2 p-4 pt-5 pb-5"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Anchored Submit Button -->
                <button type="submit" id="int-book-submit" class="w-full mt-8 bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl transform active:scale-[0.98]">
                    Submit Request
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="assets/js/portal.js"></script>
</body>
</html>
