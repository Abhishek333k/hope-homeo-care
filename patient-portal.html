<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | Hope Homeo Care</title>
    <meta name="title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta name="description" content="Expert homeopathic treatment in Mangalagiri. Specialized care for chronic diseases, skin conditions, respiratory issues, and holistic wellness.">
    <meta name="keywords" content="Homeopathy, Mangalagiri, Dr. K. Nikhil Joshua, Homeo clinic, best homeopathy doctor, chronic disease treatment, BHMS">
    <meta name="author" content="Hope Homeo Care">
    <meta name="theme-color" content="#0f766e">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hopehomeocare.web.app/"> 
    <meta property="og:title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta property="og:description" content="Expert homeopathic treatment in Mangalagiri. Book your online or in-person consultation today.">
    <meta property="og:image" content="https://hopehomeocare.web.app/assets/images/gallery/hope-homeo-care-mangalagiri-guntur-general-physician-doctors-rgezx3ppq6.jpg"> 

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://hopehomeocare.web.app/">
    <meta property="twitter:title" content="Hope Homeo Care | Dr. K. Nikhil Joshua">
    <meta property="twitter:description" content="Expert homeopathic treatment in Mangalagiri. Book your online or in-person consultation today.">
    <meta property="twitter:image" content="https://hopehomeocare.web.app/assets/images/gallery/hope-homeo-care-mangalagiri-guntur-general-physician-doctors-rgezx3ppq6.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Overwriting Tailwind's default teal to match the Logo's Medical Green
                        teal: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a', // Primary Logo Green
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        // Overwriting Tailwind's slate to match the Logo's Deep Navy Text
                        slate: {
                            700: '#1e293b',
                            800: '#0f172a',
                            900: '#0B1320', // Logo Deep Navy
                            950: '#060B13',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        /* Global Accessibility Focus States */
        *:focus-visible {
            outline: 2px solid #0f766e;
            /* Teal 700 */
            outline-offset: 2px;
        }

        body {
            font-family: 'Outfit', sans-serif;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <a href="index.html" class="flex items-center gap-2 text-teal-700 font-bold text-xl">
            <span class="material-icons-round">arrow_back</span> Back to Clinic
        </a>
        <div class="flex items-center gap-3">
            <button id="switch-profile-btn" class="hidden text-sm font-bold text-teal-600 hover:bg-teal-50 px-4 py-2 rounded-lg transition-colors border border-teal-200">Switch Family Member</button>
            <button id="logout-btn" class="hidden text-sm font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-lg transition-colors">Logout</button>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-6 overflow-y-auto">
        
        <div id="profile-selector-view" class="hidden w-full max-w-2xl mx-auto mt-8 text-center">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Who is accessing?</h2>
            <p class="text-slate-500 mb-8">Multiple profiles are linked to this mobile number.</p>
            <div id="family-profiles-container" class="flex flex-wrap justify-center gap-6">
                <!-- Profiles injected by JS -->
            </div>
        </div>

        <div id="unified-feed-view" class="hidden max-w-3xl mx-auto w-full px-4 pb-20">
            <!-- Profile Sticky Header -->
            <div class="sticky top-0 z-20 mb-8 transform transition-all duration-300">
                <div class="bg-white/80 backdrop-blur-xl border border-white/40 rounded-[2rem] p-5 shadow-[0_8px_32px_rgba(0,0,0,0.06)] flex items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div id="feed-avatar" class="w-12 h-12 rounded-2xl bg-teal-600 flex items-center justify-center text-white text-xl font-bold shadow-lg shadow-teal-600/20">
                            <!-- Initials -->
                        </div>
                        <div class="overflow-hidden">
                            <h2 id="feed-patient-name" class="text-lg font-bold text-slate-800 leading-none truncate">Patient Name</h2>
                            <p id="feed-patient-phone" class="text-slate-500 text-[13px] font-medium mt-1 truncate">+91 0000000000</p>
                        </div>
                    </div>
                    <button id="switch-profile-btn" class="p-2.5 rounded-xl bg-slate-50 border border-slate-200 text-slate-400 hover:text-teal-600 hover:bg-teal-50 hover:border-teal-100 transition-all active:scale-95" title="Switch Profile">
                        <span class="material-icons-round">group</span>
                    </button>
                </div>
            </div>

            <!-- Primary Action -->
            <div class="mb-10">
                <button onclick="window.openInternalBooking()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-900/10 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    <span class="material-icons-round">add_circle</span> Request New Appointment
                </button>
            </div>

            <!-- Unified Clinical Feed -->
            <div class="relative border-l-2 border-slate-200 ml-4 pl-6 space-y-8" id="feed-stream">
                <!-- Data Stream (Prescriptions + Appointments) will be merged here -->
            </div>
        </div>
    </main>

    <div id="recaptcha-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <div id="internal-booking-modal" 
        role="dialog" aria-modal="true" aria-hidden="true"
        class="hidden fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 opacity-0 transition-opacity">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 p-6 relative">
            <button onclick="window.closeInternalBooking()" class="absolute top-4 right-4 text-slate-400 hover:text-rose-500"><span class="material-icons-round">close</span></button>
            <h3 class="text-xl font-bold text-slate-800 mb-1">Book New Session</h3>
            <p class="text-sm text-slate-500 mb-6">Booking for: <span id="booking-for-name" class="font-bold text-teal-600"></span></p>
            
            <form id="internal-booking-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Preferred Date</label>
                    <input type="text" id="int-book-date" placeholder="Select Date" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-teal-500">
                </div>
                <div class="mb-5 w-full overflow-hidden">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Morning Session</label>
                    <div class="flex overflow-x-auto space-x-3 pb-3 scrollbar-hide w-full snap-x">
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="10:00 AM">10:00 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="10:30 AM">10:30 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="11:00 AM">11:00 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="11:30 AM">11:30 AM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="12:00 PM">12:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="12:30 PM">12:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="01:00 PM">01:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="01:30 PM">01:30 PM</button>
                    </div>

                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2 mt-2">Evening Session</label>
                    <div class="flex overflow-x-auto space-x-3 pb-3 scrollbar-hide w-full snap-x">
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="05:00 PM">05:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="05:30 PM">05:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="06:00 PM">06:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="06:30 PM">06:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="07:00 PM">07:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="07:30 PM">07:30 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="08:00 PM">08:00 PM</button>
                        <button type="button" class="slot-pill snap-start shrink-0 px-5 py-2.5 rounded-full border border-slate-200 bg-slate-50 text-slate-600 font-semibold text-sm focus:outline-none transition-colors" data-value="08:30 PM">08:30 PM</button>
                    </div>
                    <input type="hidden" id="int-book-time" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Brief Symptoms / Reason</label>
                    <textarea id="int-book-symptoms" required rows="2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-teal-500 resize-none" placeholder="e.g., Fever, follow-up..."></textarea>
                </div>
                <button type="submit" id="int-book-submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all shadow-sm mt-2">Submit Request</button>
            </form>
        </div>
    </div>

    <script type="module" src="assets/js/portal.js"></script>
</body>
</html>
