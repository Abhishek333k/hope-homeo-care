<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal - Hope Homeo Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style> body { font-family: 'Outfit', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <a href="index.html" class="flex items-center gap-2 text-teal-700 font-bold text-xl">
            <span class="material-icons-round">arrow_back</span> Back to Clinic
        </a>
        <button id="logout-btn" class="hidden text-sm font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-lg transition-colors">Logout</button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6">
        
        <div id="auth-view" class="bg-white max-w-sm w-full p-8 rounded-2xl shadow-xl border border-slate-100">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Patient Login</h2>
            
            <div id="login-phone-step" class="block">
                <p class="text-sm text-slate-500 mb-6">Enter your registered mobile number.</p>
                <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden mb-4 focus-within:ring-2 focus-within:ring-teal-500">
                    <span class="bg-slate-50 px-3 py-2 text-slate-500 font-medium border-r">+91</span>
                    <input type="tel" id="login-phone" placeholder="10-digit number" maxlength="10" class="w-full px-4 py-2 outline-none">
                </div>
                <button id="send-otp-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition-all shadow-sm">Send OTP</button>
            </div>

            <div id="login-otp-step" class="hidden">
                <p class="text-sm text-slate-500 mb-6">Enter the 6-digit code sent to your phone.</p>
                <input type="text" id="login-otp" placeholder="••••••" maxlength="6" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none text-center tracking-widest text-2xl font-bold mb-4">
                <button id="verify-otp-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-all shadow-sm">Verify & Login</button>
            </div>
        </div>

        <div id="dashboard-view" class="hidden w-full max-w-4xl mx-auto mt-8">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">My Appointments</h2>
                <p class="text-slate-500">Your medical history and current status.</p>
            </div>
            <div id="patient-appointments-list" class="space-y-4">
            </div>
        </div>

    </main>

    <div id="recaptcha-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="assets/js/portal.js"></script>
</body>
</html>
