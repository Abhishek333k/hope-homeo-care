<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal - Hope Homeo Care</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style> body { font-family: 'Outfit', sans-serif; } </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    
    <header class="bg-white border-b border-slate-200 py-4 px-6 flex justify-between items-center shadow-sm">
        <a href="index.html" class="flex items-center gap-2 text-teal-700 font-bold text-xl">
            <span class="material-icons-round">arrow_back</span> Back to Clinic
        </a>
        <button id="logout-btn" class="hidden text-sm font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-lg transition-colors">Logout</button>
    </header>

    <div id="portal-nav" class="hidden max-w-4xl mx-auto w-full px-6 mt-8 border-b border-slate-200 flex gap-6">
        <button id="tab-dashboard" class="tab-btn pb-3 border-b-2 border-teal-600 text-teal-700 font-bold text-sm transition-all">Overview</button>
        <button id="tab-records" class="tab-btn pb-3 border-b-2 border-transparent text-slate-500 hover:text-slate-800 font-medium text-sm transition-all">Medical Records & Prescriptions</button>
        <button id="tab-profile" class="tab-btn pb-3 border-b-2 border-transparent text-slate-500 hover:text-slate-800 font-medium text-sm transition-all">My Profile</button>
    </div>

    <main class="flex-1 flex flex-col p-6 overflow-y-auto">
        
        <div id="profile-selector-view" class="hidden w-full max-w-2xl mx-auto mt-8 text-center">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Who is accessing?</h2>
            <p class="text-slate-500 mb-8">Multiple profiles are linked to this mobile number.</p>
            <div id="family-profiles-container" class="flex flex-wrap justify-center gap-6">
            </div>
        </div>

        <div id="dashboard-view" class="hidden w-full max-w-4xl mx-auto">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Recent Appointments</h2>
                <p class="text-slate-500">Your upcoming and past clinic visits.</p>
            </div>
            <div id="patient-appointments-list" class="space-y-4">
            </div>
        </div>

        <div id="view-records" class="hidden w-full max-w-4xl mx-auto">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Medical Records</h2>
                <p class="text-slate-500">History of prescriptions, diagnostic logs, and expert advice.</p>
            </div>
            <div id="records-list" class="space-y-6"></div>
        </div>

        <div id="view-profile" class="hidden w-full max-w-4xl mx-auto">
            <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
                <h2 class="text-2xl font-bold text-slate-800 mb-6">Personal Profile</h2>
                <div id="profile-details" class="space-y-4 text-slate-600">
                    <p class="text-slate-400 italic">Profile information coming soon...</p>
                </div>
            </div>
        </div>

    </main>

    <div id="recaptcha-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-[200] flex flex-col gap-3 pointer-events-none"></div>

    <script type="module" src="assets/js/portal.js"></script>
</body>
</html>
